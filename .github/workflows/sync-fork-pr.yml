name: Sync Fork with Upstream
on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: actions-template-sync
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: j-hc/revanced-magisk-module
          upstream_branch: main
          pr_labels: sync-fork
          pr_title: "[Sync] Sync with upstream"
          pr_commit_msg: "chore(template): merge template changes"
          source_gh_token: ${{ secrets.PAT_TOKEN }}
          target_gh_token: ${{ secrets.PAT_TOKEN }}
